<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>World Clock</h1>
  <main class="clock-grid">
    <section class="clock-panel">
      <select id="tz-select-1"></select>
      <div class="time-display" id="time-1">--:--:--</div>
      <div class="date-display" id="date-1">---</div>
      <div class="offset-display" id="offset-1">---</div>
    </section>
    <section class="clock-panel">
      <select id="tz-select-2"></select>
      <div class="time-display" id="time-2">--:--:--</div>
      <div class="date-display" id="date-2">---</div>
      <div class="offset-display" id="offset-2">---</div>
    </section>
    <section class="clock-panel">
      <select id="tz-select-3"></select>
      <div class="time-display" id="time-3">--:--:--</div>
      <div class="date-display" id="date-3">---</div>
      <div class="offset-display" id="offset-3">---</div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
